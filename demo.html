<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheWineBase</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #4a0e0e;
      background-color: #f8f4f3;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Header styles */
    header {
      background-color: #FFF;
      color: #4a0e0e;
      padding: 1rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .logo img {
      max-width: 80%;
    }

    .nav-links {
      display: flex;
      list-style: none;
    }

    .nav-links li {
      margin-left: 1.5rem;
    }

    .nav-links a:hover {
      color: #d4af37;
    }

    /* Hero section styles */
    .hero {
      height: 80vh;
      background-image: url('images/wine5.jpeg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background-color: #d4af37;
      color: #4a0e0e;
      padding: 0.75rem 1.5rem;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #b8960f;
    }

    /* Featured wines section styles */
    .featured-wines {
      padding: 4rem 1rem;
      background-color: white;
    }

    .featured-wines h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 2rem;
    }

    .wine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .wine-card {
      background-color: #f8f4f3;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .wine-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .wine-info {
      padding: 1rem;
    }

    .wine-info h3 {
      margin-bottom: 0.5rem;
    }

    /* Newsletter section styles */
    .newsletter {
      background-color: #4a0e0e;
      color: white;
      padding: 4rem 1rem;
      text-align: center;
    }

    .newsletter h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .newsletter p {
      margin-bottom: 2rem;
    }

    .newsletter form {
      display: flex;
      justify-content: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .newsletter input[type="email"] {
      flex-grow: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 5px 0 0 5px;
    }

    .newsletter button {
      background-color: #d4af37;
      color: #4a0e0e;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0 5px 5px 0;
      cursor: pointer;
      font-weight: bold;
    }

    .newsletter button:hover {
      background-color: #b8960f;
    }

    /* Footer styles */
    footer {
      background-color: #2c0606;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }

    .social-links {
      margin-top: 1rem;
    }

    .social-links a {
      display: inline-block;
      margin: 0 0.5rem;
      font-size: 1.5rem;
    }

    .social-links a:hover {
      color: #d4af37;
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .hero p {
        font-size: 1rem;
      }

      .wine-grid {
        grid-template-columns: 1fr;
      }

      .newsletter form {
        flex-direction: column;
      }

      .newsletter input[type="email"],
      .newsletter button {
        width: 100%;
        border-radius: 5px;
      }

      .newsletter button {
        margin-top: 1rem;
      }
    }

    .chat-button {
      position: fixed;
      bottom: 20px;
      right: 100px;
      background-color: #822121;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s;
      z-index: 1000;
    }
    .chat-button button {
      border: none;
      padding: 10px;
    }

    .chat-button:hover {
      background-color: #C7254E;
    }

    .modal-content {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      border-bottom: none;
      background-color: #8B1F3F;
      color: white;
      border-radius: 15px 15px 0 0;
    }

    .modal-footer {
      border-top: none;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-title {
      font-weight: bold;
    }

    .modal-footer .btn {
      background-color: white;
      color: #8B1F3F;
    }

    .modal-footer .btn:hover {
      background-color: #C7254E;
      color: white;
    }

    .btn-gradient {
      background: linear-gradient(135deg, #5B0F1A 0%, #8B1F3F 100%);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: white !important;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-gradient:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 10px 25px rgba(91, 15, 26, 0.5);
    }

    .chat-button-premium {
      position: fixed;
      bottom: 40px;
      right: 40px;
      z-index: 1000;
      display: flex;
      align-items: center;
      background: rgba(44, 6, 6, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 50px;
      padding: 6px 6px 6px 28px;
      color: #D4AF37;
      text-decoration: none;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .chat-button-premium:hover {
      background: rgba(44, 6, 6, 0.9);
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(212, 175, 55, 0.8);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }

    .chat-button-premium .text-wrapper {
      margin-right: 20px;
      font-weight: 700;
      letter-spacing: 1.2px;
      font-size: 0.95rem;
      text-transform: uppercase;
      font-family: 'Georgia', serif;
    }

    .chat-button-premium .icon-wrapper {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      position: relative;
    }

    .chat-button-premium .icon-wrapper i {
      color: #2C0606 !important;
    }

    .chat-button-premium .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      animation: pulse-ring-gold 2.5s infinite;
      z-index: -1;
    }

    @keyframes pulse-ring-gold {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.8); opacity: 0; }
    }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
  <header>
    <nav>
      <div class="logo">
        <img src="images/Logo_R_Dark.png" alt="Logo">
      </div>
      <!--<ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#wines">Our Wines</a></li>
        <li><a href="#about">About Us</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>-->
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <div class="hero-content">
        <h1>Discover Exquisite Wines</h1>
        <p>Indulge in the finest selections from our vineyard</p>
        <a href="#wines" class="btn">Explore Our Collection</a>
      </div>
    </section>

    <section id="wines" class="featured-wines">
      <h2>Featured Wines</h2>
      <div class="wine-grid">
        <div class="wine-card">
          <img src="images/wine7.jpeg" alt="Crimson Reserve">
          <div class="wine-info">
            <h3>Crimson Reserve</h3>
            <p>Vintage: 2018</p>
          </div>
        </div>
        <div class="wine-card">
          <img src="images/wine1.jpeg" alt="Golden Chardonnay">
          <div class="wine-info">
            <h3>Golden Chardonnay</h3>
            <p>Vintage: 2020</p>
          </div>
        </div>
        <div class="wine-card">
          <img src="images/wine9.jpeg" alt="Rosé Delight">
          <div class="wine-info">
            <h3>Rosé Delight</h3>
            <p>Vintage: 2021</p>
          </div>
        </div>
      </div>
    </section>

    <!--<section id="newsletter" class="newsletter">
      <h2>Join Our Wine Club</h2>
      <p>Subscribe to our newsletter for exclusive offers and wine tasting events</p>
      <form>
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
      </form>
    </section>-->
  </main>

  <!-- Modal -->
  <div class="modal fade" id="audioModal" tabindex="-1" aria-labelledby="audioModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="audioModalLabel">Audio Chat</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
          <iframe allow="microphone" src="app.html" style="width: 100%; height: 500px; border: none;"></iframe>

      </div>
    </div>
  </div>

  <div class="chat-button-premium shadow-lg" data-bs-toggle="modal" data-bs-target="#audioModal">
    <div class="text-wrapper">Talk to Wine Expert</div>
    <div class="icon-wrapper">
      <div class="pulse-ring"></div>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.5 3.5C17.5 2.67 16.83 2 16 2H8C7.17 2 6.5 2.67 6.5 3.5V11C6.5 14.04 8.96 16.5 12 16.5C15.04 16.5 17.5 14.04 17.5 11V3.5ZM15.5 4V7H8.5V4H15.5ZM8.5 11V9H15.5V11C15.5 12.93 13.93 14.5 12 14.5C10.07 14.5 8.5 12.93 8.5 11Z" fill="#2C0606"/>
        <path d="M13 18.23V20H15C15.55 20 16 20.45 16 21C16 21.55 15.55 22 15 22H9C8.45 22 8 21.55 8 21C8 20.45 8.45 20 9 20H11V18.23C8.6 17.85 6.7 15.93 6.13 13.52C5.99 12.91 6.53 12.38 7.15 12.51C9.17 12.93 11.13 13.11 13 12.58C13.62 12.42 14.15 12.97 14 13.58C13.43 15.98 11.45 17.88 9 18.23H13Z" fill="#2C0606"/>
      </svg>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const audioModal = document.getElementById('audioModal');
    const iframe = audioModal.querySelector('iframe');

    audioModal.addEventListener('shown.bs.modal', () => {
        // Send message to iframe when modal is fully visible
        if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage('open-winesbot', '*');
        }
    });

    // Handle close from within iframe
    window.addEventListener('message', (event) => {
        if (event.data === 'close-winesbot') {
            const modal = bootstrap.Modal.getInstance(audioModal);
            if (modal) modal.hide();
        }
    });
  </script>
</body>
</html>
